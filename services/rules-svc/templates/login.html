<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>gdlf — sign in</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="stylesheet" href="/static/app.css?v={{ css_v() }}">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding: 24px; box-sizing: border-box; }
  .login-card { max-width: 640px; width: 100%; text-align: center; }
  .login-card img {
    width: 100%; height: auto; display: block; margin: 0 auto 28px;
    border-radius: 12px;
    filter: drop-shadow(0 12px 48px rgba(0,0,0,0.6));
  }
  .login-card h1 { font-size: 36px; margin: 0 0 8px; color: #fff; letter-spacing: 0.3px; text-transform: none; line-height: 1.1; }
  .login-card .sub { color: var(--muted); font-size: 18px; margin: 0 0 32px; }
  .login-card form { text-align: left; max-width: 420px; margin: 0 auto; }
  .login-card label { font-size: 13px; }
  .login-card input[type=password] {
    font-size: 16px; padding: 12px 14px;
    letter-spacing: 4px;
  }
  .login-card button[type=submit] {
    width: 100%; margin-top: 16px;
    font-size: 15px; padding: 12px 18px;
  }
  .login-card .err { color: var(--danger); margin: 0 0 14px; font-size: 13px; text-align: center; }
  .login-card .brand-tag { font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 32px; }
</style>
</head>
<body>
<main class="login-card">
  <img src="/static/gandalf.png" alt="">
  <h1>You shall not pass…</h1>
  <p class="sub">…without the password.</p>
  {% if error %}<p class="err">Incorrect password.</p>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <label>Admin password</label>
    <input type="password" name="password" required autofocus>
    <button type="submit">Sign in</button>
  </form>
  <div class="brand-tag">gdlf</div>
</main>
</body>
</html>
