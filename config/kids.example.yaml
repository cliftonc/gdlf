# gdlf kids policy — example template.
#
# `./gdlf init` copies this to config/kids.yaml on first run if the real
# file is missing. config/kids.yaml is gitignored (it contains real names
# + WG public keys); this file is the safe-to-commit version.
#
# Schema lives in services/rules-svc/src/gdlf/schema.py. The dashboard
# can read/write this file directly — UI edits and hand edits cooperate.

kids:
  # Example kid. Delete or replace via the dashboard.
  - name: example-kid
    age: 12
    devices: []                  # populated by the device-enrolment wizard
    schedule:
      weekday: { allowed: "07:00-21:00" }
      weekend: { allowed: "08:00-22:00" }
    # AdGuard blocked-service IDs — toggle via the dashboard's "Services"
    # tab on the kid. Catalog comes from AdGuard (/control/blocked_services/all).
    blocked_apps: []
    url_rules:
      # Examples — first match wins.
      # - { action: block, match: "youtube.com/shorts/*" }
      # - { action: block, match: "*/search", query: "q=.*\\bweed\\b.*", flag: true }
      # - { action: allow, match: "youtube.com/@KhanAcademy/*" }
    keyword_flags: []
