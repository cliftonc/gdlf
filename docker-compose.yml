# gdlf stack.
#
# Source of truth: config/kids.yaml. rules-svc renders config/wg/wg0.conf
# from it and signals the wg container to reload.
#
# Network: gdlf bridge at 10.42.0.0/24. Peer traffic emerges from wg0 (in
# the wg container's netns) and is routed by the nftables sidecar to
# AdGuard (10.42.0.10) for DNS and mitmproxy (10.42.0.11) for HTTP/HTTPS.

services:
  wg:
    # Minimal WireGuard runtime. The conf at /config/wg_confs/wg0.conf is
    # rendered by rules-svc; we reload via `wg syncconf` (or fallback restart).
    #
    # The wg container's network namespace is shared by `nftables` and
    # `adguard` so that AdGuard receives DNS queries with the kid's real
    # 10.13.13.x source IP (no masquerade in between), and the nft firewall
    # owns wg0's routing.
    image: linuxserver/wireguard:latest
    container_name: gdlf-wg
    restart: unless-stopped
    cap_add: [NET_ADMIN, SYS_MODULE]
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      # Allow DNAT to 127.0.0.1 (used by nftables to capture rogue DNS).
      - net.ipv4.conf.all.route_localnet=1
    environment:
      PUID: 0
      PGID: 0
      TZ: ${TZ}
    volumes:
      - ./config/wg:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WG_PORT}:51820/udp"
      # AdGuard runs inside this netns — expose its admin UI on the host.
      # The setup wizard (:3000) is intentionally not bound; `./gdlf init`
      # seeds AdGuardHome.yaml with an admin user so the wizard is skipped.
      - "${ADGUARD_UI_PORT:-8082}:80/tcp"
    networks:
      gdlf:
        ipv4_address: 10.42.0.2
    # Healthcheck = wg0 is up. Sharer containers (adguard / mitm / blockpage /
    # nftables) gate on this so they can't join the netns before wg-quick has
    # actually attached the interface — that race was producing dead listeners
    # on cold starts.
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  nftables:
    build: ./nftables
    container_name: gdlf-nft
    restart: unless-stopped
    network_mode: "service:wg"   # share wg's netns so we see wg0 directly
    cap_add: [NET_ADMIN]
    volumes:
      - ./config/kids.yaml:/etc/gdlf/kids.yaml:ro
      - ./config/state:/var/lib/gdlf
    environment:
      RULES_SVC_URL: http://10.42.0.20:8080
      ADGUARD_IP: 10.42.0.10
      MITM_IP: 10.42.0.11
      WG_SUBNET: ${WG_SUBNET}
      TZ: ${TZ}
    depends_on:
      wg:
        condition: service_healthy

  adguard:
    image: adguard/adguardhome:latest
    container_name: gdlf-adguard
    restart: unless-stopped
    # Share wg's netns so AdGuard sees DNS queries with the kid's real
    # 10.13.13.x source IP (no SNAT in between). The web UI and setup
    # wizard are exposed via the wg container's port mappings.
    network_mode: "service:wg"
    volumes:
      - ./config/adguard/work:/opt/adguardhome/work
      - ./config/adguard/conf:/opt/adguardhome/conf
    depends_on:
      wg:
        condition: service_healthy

  blockpage:
    # Tiny HTTP server (port 8888) that returns a "you're out of allowed
    # hours" page for any path. nftables redirects schedule-blocked
    # clients' :80 here so kids see an explanation instead of a timeout.
    build: ./services/blockpage
    container_name: gdlf-blockpage
    restart: unless-stopped
    network_mode: "service:wg"
    depends_on:
      wg:
        condition: service_healthy

  mitmproxy:
    build: ./services/mitmproxy
    container_name: gdlf-mitm
    restart: unless-stopped
    # Share wg's netns so mitmproxy sees the kid's real 10.13.13.x source IP
    # (no SNAT in between) and we can route the DNAT to 127.0.0.1:8080.
    network_mode: "service:wg"
    command:
      - mitmdump
      - --mode
      - transparent
      - --showhost
      - --set
      - block_global=false
      - --set
      - confdir=/home/mitmproxy/.mitmproxy
      # Stream response bodies larger than 512k instead of buffering them in
      # memory. Big downloads (Steam content, Windows Update fallbacks) used
      # to pin a full multi-MB body in RAM per flow before the addon ran;
      # streaming drops both memory and CPU during bulk transfers.
      - --set
      - stream_large_bodies=512k
      # Silence per-flow request/response chatter on stdout — we already
      # sink every request to SQLite via /api/events. Warnings + errors
      # still print so real problems (cert issues, addon crashes) stay
      # visible in `docker logs gdlf-mitm`.
      - --set
      - flow_detail=0
      - --set
      - termlog_verbosity=warn
      - -s
      - /addons/mitm_capture.py
    volumes:
      - ./config/mitmproxy:/home/mitmproxy/.mitmproxy
      - ./services/rules-svc/addons:/addons:ro
    environment:
      RULES_SVC_URL: http://10.42.0.20:8080
      TZ: ${TZ}
    # Raise nofile so a busy device can't exhaust mitmproxy's FDs.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      wg:
        condition: service_healthy

  caddy:
    # TLS front-door for the MDM endpoints. Validates device client certs
    # against the gdlf MDM CA (services/proxy/Caddyfile) and forwards cert
    # details to rules-svc as headers.
    #
    # Caddy listens on CADDY_HTTPS_PORT (default 8081), NOT 443, so an
    # upstream reverse proxy can SNI-passthrough mdm.<domain>:443 to this
    # port. Let's Encrypt TLS-ALPN-01 challenges arrive via the same
    # passthrough, so no port 80/443 binding is needed here.
    build: ./services/proxy        # custom Caddy with cloudflare DNS plugin
    container_name: gdlf-caddy
    restart: unless-stopped
    profiles: ["mdm"]
    ports:
      - "${CADDY_HTTPS_PORT:-8081}:${CADDY_HTTPS_PORT:-8081}"
    volumes:
      - ./services/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Mount one of issuer.acme.conf or issuer.internal.conf as the
      # active issuer, chosen by CADDY_TLS_ISSUER.
      - ./services/proxy/issuer.${CADDY_TLS_ISSUER:-acme}.conf:/etc/caddy/issuer.conf:ro
      - ./config/state/mdm-ca/ca.pem:/etc/gdlf/mdm-ca/ca.pem:ro
      - ./config/state/caddy/data:/data         # Let's Encrypt cert + Caddy state
      - ./config/state/caddy/config:/config
    environment:
      MDM_HOSTNAME: ${MDM_HOSTNAME:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
      CADDY_HTTPS_PORT: ${CADDY_HTTPS_PORT:-8081}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      MDM_PROXY_SECRET: ${MDM_PROXY_SECRET:-}
    networks: [gdlf]
    # Docker's embedded resolver at 127.0.0.11 doesn't return SOA records,
    # which breaks libdns's zone discovery for ACME DNS-01 challenges.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on: [rules-svc]

  rules-svc:
    build: ./services/rules-svc
    container_name: gdlf-rules
    restart: unless-stopped
    environment:
      KIDS_YAML: /etc/gdlf/kids.yaml
      STATE_DIR: /var/lib/gdlf
      WG_CONF_PATH: /etc/wireguard/wg_confs/wg0.conf
      WG_CONTAINER: gdlf-wg
      # AdGuard shares wg's netns; reach it via wg's gdlf-bridge IP (port 80
      # inside wg's netns is published on the host as 8082 too).
      ADGUARD_URL: http://10.42.0.2:80
      ADGUARD_ADMIN_PASSWORD: ${ADGUARD_ADMIN_PASSWORD}
      ADGUARD_UI_PORT: ${ADGUARD_UI_PORT:-8082}
      ADMIN_PASSWORD: ${RULES_SVC_ADMIN_PASSWORD}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TO: ${SMTP_TO}
      WG_HOST: ${WG_HOST}
      WG_PORT: ${WG_PORT}
      WG_SUBNET: ${WG_SUBNET}
      TZ: ${TZ}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
      MAX_EVENTS: ${MAX_EVENTS:-200000}
      # MDM enrollment profiles need a public URL that devices can reach.
      # e.g. https://gdlf.cliftonc.nl:8443  — empty disables /mdm/* endpoints.
      MDM_BASE_URL: ${MDM_BASE_URL:-}
      MDM_PROXY_SECRET: ${MDM_PROXY_SECRET:-}
    volumes:
      - ./config/kids.yaml:/etc/gdlf/kids.yaml
      - ./config/wg:/etc/wireguard          # rules-svc writes wg0.conf here
      - ./config/mitmproxy:/etc/gdlf/mitmproxy
      - ./config/state:/var/lib/gdlf
      - /var/run/docker.sock:/var/run/docker.sock:ro   # used to reload/restart gdlf-wg + dashboard stats
    ports:
      - "${DASHBOARD_PORT}:8080"
    networks:
      gdlf:
        ipv4_address: 10.42.0.20
    depends_on: [adguard]

networks:
  gdlf:
    driver: bridge
    ipam:
      config:
        - subnet: 10.42.0.0/24
